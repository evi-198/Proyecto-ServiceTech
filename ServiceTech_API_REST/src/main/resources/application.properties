spring.application.name=ServiceTech
server.port=8080

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# DATASOURCE - MYSQL
# ===============================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/servicetech?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root

# ===============================
# LOGS (modo aprendizaje)
# ===============================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ===============================
# NAMING STRATEGY
# ===============================
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# ===============================
# TECNICOS - CARGA DE TRABAJO
# ===============================
# Limite referencial de ordenes activas por tecnico (solo aviso, no bloqueo real)
servicetech.tecnico.limite-ordenes-activas=10 


# ===============================
# JWT (Spring Security)
# ===============================
# Clave secreta usada para firmar y validar los tokens. En un proyecto real
# esto NO se sube al repositorio (iria en una variable de entorno), pero
# para el proyecto academico se deja aqui por simplicidad.
jwt.secret=187de03beb85ca80b791592358629415e489cfc6e033c5900196305153aef6c7
# Tiempo de vida del token en milisegundos (aqui: 24 horas)
jwt.expiration-ms=86400000